            },
            backgroundImage: {
              'void-gradient': "radial-gradient(circle at center, #1F2937 0%, #0B0C10 100%)",
            },
            animation: {
              'spin-slow': 'spin 20s linear infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'scan': 'scanline 8s linear infinite',
              'glitch': 'glitch 0.2s linear infinite',
              'blink': 'blink 1s step-end infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              scanline: {
                '0%': { top: '-100%' },
                '100%': { top: '200%' },
              },
              glitch: {
                '0%': { transform: 'translate(0)' },
                '20%': { transform: 'translate(-2px, 2px)' },
                '40%': { transform: 'translate(-2px, -2px)' },
                '60%': { transform: 'translate(2px, 2px)' },
                '80%': { transform: 'translate(2px, -2px)' },
                '100%': { transform: 'translate(0)' },
              },
              blink: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0' },
              }
            }
          }
        }
      }
    </script>
    <style>
      html {

      body {
        background-color: #0B0C10;

        font-family: "Inter", sans-serif;

      ::selection {

        color: white;
      }

      /* Updated glow to be more subtle as requested */
      .text-glow { text-shadow: 0 0 8px rgba(59, 130, 246, 0.4); }
      
      /* Glass effect classes */
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      .glass-dark {
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      .glass-blue {
        background: rgba(59, 130, 246, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(59, 130, 246, 0.2);
      }
      
      /* Hover glow effect for cards */
      .hover-glow {
        transition: all 0.3s ease;
      }
      .hover-glow:hover {
        box-shadow: 0 0 30px rgba(59, 130, 246, 0.15), 0 0 60px rgba(59, 130, 246, 0.1);
      }
      
      .clip-path-slant { clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .logo-filter { filter: brightness(0) invert(1) sepia(0) saturate(0) opacity(0.8); }

      /* LENIS RECCOMENDED STYLES */
      html.lenis, html.lenis body {
        height: auto;
      }
      .lenis.lenis-smooth {
        scroll-behavior: auto !important;
      }
      .lenis.lenis-smooth [data-lenis-prevent] {
        overscroll-behavior: contain;
      }
      .lenis.lenis-stopped {
        overflow: hidden;
      }
      .lenis.lenis-scrolling iframe {
        pointer-events: none;
      }
    </style>

    <!-- Security: Disable right-click and common dev tools shortcuts in production -->
    <script>
      (function() {
        // Only apply in production (when not on localhost)
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return;
        
        // Disable right-click context menu
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        
        // Disable common keyboard shortcuts for dev tools
        document.addEventListener('keydown', function(e) {
          // F12
          if (e.key === 'F12') { e.preventDefault(); return false; }
          // Ctrl+Shift+I (Dev Tools)
          if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
          // Ctrl+Shift+J (Console)
          if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'J') { e.preventDefault(); return false; }
          // Ctrl+U (View Source)
          if ((e.ctrlKey || e.metaKey) && e.key === 'u') { e.preventDefault(); return false; }
          // Ctrl+Shift+C (Inspect Element)
          if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'C') { e.preventDefault(); return false; }
        });
        
        // Disable text selection on sensitive elements
        document.addEventListener('selectstart', function(e) {
          if (e.target.closest('.no-select')) { e.preventDefault(); }
        });
        
        // Clear console periodically to deter snooping
        setInterval(function() { console.clear(); }, 1000);
        
        // Detect dev tools via debugger timing (basic detection)
        (function detectDevTools() {
          var devtools = { open: false };
          setInterval(function() {
            var start = performance.now();
            debugger;
            var diff = performance.now() - start;
            devtools.open = diff > 100;
            if (devtools.open) {
              document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0B0C10;color:white;font-family:sans-serif;"><div style="text-align:center;"><h1>🔒 Access Restricted</h1><p>Developer tools are not allowed on this page.</p></div></div>';
            }
          }, 500);
        })();
      })();
    </script>
